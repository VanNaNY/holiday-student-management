# 生产环境：MySQL（目标库）。通过环境变量注入连接信息。
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:holiday}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  # 生产不自动建表/灌数据，请手动导入 docs/db/schema.sql、data.sql
  sql:
    init:
      mode: never
